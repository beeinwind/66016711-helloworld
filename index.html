<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV终极播放器</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;font-family:-apple-system;background:#f5f5f5}
.header{padding:10px;background:#fff;position:sticky;top:0}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd}
video{width:100%;background:#000}
.container{padding:10px}
.item{display:flex;justify-content:space-between;background:#fff;padding:12px;border-radius:10px;margin-bottom:8px}
button{background:#007aff;color:#fff;border:none;padding:6px 10px;border-radius:6px}
</style>
</head>
<body>

<div class="header">
<input id="input" placeholder="粘贴CCTV链接或VID，回车">
</div>

<video id="video" controls playsinline></video>
<div class="container" id="list"></div>

<script>
const input=document.getElementById('input');
const list=document.getElementById('list');
const video=document.getElementById('video');

let episodes=[];
let current=-1;
let hls;

// 提取VID
function extractVID(url){
  const m=url.match(/VID[A-Z0-9]+/);
  return m?m[0]:url.trim();
}

// 自动生成连续VID（关键优化）
function generateVIDs(baseVid,count=20){
  const prefix=baseVid.slice(0,-6);
  let num=parseInt(baseVid.slice(-6));
  let list=[];
  for(let i=0;i<count;i++){
    list.push(prefix+(num+i));
  }
  return list;
}

// 获取m3u8
async function getM3U8(vid){
  const api=`https://vdn.apps.cntv.cn/api/getHttpVideoInfo.do?pid=${vid}`;
  const res=await fetch(api);
  const data=await res.json();
  return data.hls_url;
}

async function play(i){
  if(current===i && !video.paused){
    video.pause();
    return;
  }
  current=i;

  const url=await getM3U8(episodes[i].vid);

  if(hls){hls.destroy();}

  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src=url;
  }

  video.play();
}

function render(){
  list.innerHTML='';
  episodes.forEach((ep,i)=>{
    const div=document.createElement('div');
    div.className='item';

    const t=document.createElement('div');
    t.innerText=ep.title;

    const b=document.createElement('button');
    b.innerText='播放';
    b.onclick=()=>play(i);

    div.appendChild(t);
    div.appendChild(b);
    list.appendChild(div);
  });
}

// 自动下一集
video.addEventListener('ended',()=>{
  if(current+1<episodes.length){
    play(current+1);
  }
});

input.addEventListener('keypress',e=>{
  if(e.key==='Enter'){
    const vid=extractVID(input.value);

    const vids=generateVIDs(vid,30);

    episodes=vids.map((v,i)=>({
      title:'第'+(i+1)+'集',
      vid:v
    }));

    render();
  }
});
</script>

</body>
</html>
