<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV 播放器</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f5f5f5}
video{width:100%;background:#000}
.list{padding:10px}
.item{background:#fff;padding:12px;margin-bottom:8px;border-radius:10px;display:flex;justify-content:space-between}
button{background:#007aff;color:#fff;border:none;padding:6px 10px;border-radius:6px}
</style>
</head>

<body>

<video id="video" controls playsinline></video>
<div class="list" id="list"></div>

<script>
const video = document.getElementById('video');
const list = document.getElementById('list');

let hls;
let current = 0;

const episodes = [
  {title:"第1集", vid:"VIDA5pha2ONXCjrQsZjRAiKA210114"},
  {title:"第2集", vid:"VIDA5pha2ONXCjrQsZjRAiKA210115"},
  {title:"第3集", vid:"VIDA5pha2ONXCjrQsZjRAiKA210116"},
  {title:"第4集", vid:"VIDA5pha2ONXCjrQsZjRAiKA210117"},
  {title:"第5集", vid:"VIDA5pha2ONXCjrQsZjRAiKA210118"}
];

// 🔥 关键修复：多字段兼容
async function getUrl(vid){
  try{
    const api = `https://vdn.apps.cntv.cn/api/getHttpVideoInfo.do?pid=${vid}`;
    const res = await fetch(api);
    const data = await res.json();

    console.log("接口返回:", data);

    return data.hls_url || data.hls || data.url;
  }catch(e){
    alert("获取视频地址失败");
    return null;
  }
}

// 🔥 播放
async function play(i){
  current = i;

  const url = await getUrl(episodes[i].vid);

  if(!url){
    alert("该集无法播放（央视接口限制）");
    return;
  }

  if(hls){ hls.destroy(); }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }

  // 🔥 强制播放（解决无反应）
  video.muted = false;
  video.play().catch(()=>{
    alert("点击视频区域再试一次");
  });
}

// 渲染
episodes.forEach((ep,i)=>{
  const div = document.createElement('div');
  div.className = 'item';

  const t = document.createElement('div');
  t.innerText = ep.title;

  const b = document.createElement('button');
  b.innerText = "播放";
  b.onclick = ()=>play(i);

  div.appendChild(t);
  div.appendChild(b);
  list.appendChild(div);
});

// 自动下一集
video.addEventListener('ended',()=>{
  if(current + 1 < episodes.length){
    play(current + 1);
  }
});
</script>

</body>
</html>
